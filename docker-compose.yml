services:
  postgres-core:
    image: postgres:16-alpine
    container_name: library-postgres-core
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_SUPER_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-library_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-core-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-library_admin} -d ${POSTGRES_SUPER_DB:-postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-core-data:
